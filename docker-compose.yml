version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: registration-postgres
    environment:
      POSTGRES_DB: registration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - registration_pgdata:/var/lib/postgresql/data

volumes:
  registration_pgdata: