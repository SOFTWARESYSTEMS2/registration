<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Course Catalog</title>
    </head>
    <body>
        <nav class="d-flex justify-content-center">
            <h3>Registration</h3>
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/plan}">My Plan</a>
            <a th:href="@{/courses}">Course Catalog</a>
            <div style="margin-top: auto;">
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Logout</button>
                </form>
            </div>
        </nav>
        <h1>Course Catalog</h1>

        <p th:if="${selectedTerm != ''}">
            Showing courses for term: <span th:text="${selectedTerm}"></span>
        </p>

        <table border="1">
            <thead>
                <tr>
                    <th>Course Code</th>
                    <th>Title</th>
                    <th>Credits</th>
                    <th>Term</th>
                    <th>Capacity</th>
                    <th>Enrolled</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="offering : ${offerings}">
                    <td th:text="${offering.course.code}"></td>
                    <td th:text="${offering.course.title}"></td>
                    <td th:text="${offering.course.credits}"></td>
                    <td th:text="${offering.term.label}"></td>
                    <td th:text="${offering.capacity}"></td>
                    <td th:text="${offering.enrolledCount}"></td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
