<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Edit Semester</title></head>
<body>
<a href="/dashboard">Dashboard</a> |
<a href="/plan">My Plan</a> |
<a href="/courses">Catalog</a> |
<form th:action="@{/logout}" method="post" style="display:inline">
    <button type="submit">Logout</button>
</form>
<hr>

<h1 th:text="|Editing: ${term}|">Edit Semester</h1>
<p>Only courses that count toward your degree, have open seats, and for which you have met all prerequisites are shown.</p>

<form th:action="@{/plan/edit/save}" method="post">
    <input type="hidden" name="term" th:value="${term}"/>

    <p th:if="${#lists.isEmpty(availableOfferings)}">No eligible courses available for this term.</p>

    <table th:unless="${#lists.isEmpty(availableOfferings)}" border="1" cellpadding="4">
        <tr>
            <th>Select</th>
            <th>Code</th>
            <th>Title</th>
            <th>Credits</th>
            <th>Department</th>
            <th>Seats Open</th>
        </tr>
        <tr th:each="o : ${availableOfferings}">
            <td>
                <input type="checkbox"
                       name="selectedCourses"
                       th:value="${o.course.code}"
                       th:checked="${plannedCodes.contains(o.course.code)}"/>
            </td>
            <td th:text="${o.course.code}"></td>
            <td th:text="${o.course.title}"></td>
            <td th:text="${o.course.credits}"></td>
            <td th:text="${o.course.department.name}"></td>
            <td th:text="${o.availableSeats}"></td>
        </tr>
    </table>
    <br>
    <input type="submit" value="Save">
    <a href="/plan">Cancel</a>
</form>
</body>
</html>
